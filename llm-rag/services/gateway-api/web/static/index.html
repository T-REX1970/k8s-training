<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-rag chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="brand-mark">LR</span>
        <button id="new-chat-btn" class="new-chat-btn" type="button">+ 新しい会話</button>
      </div>
      <nav id="conversation-list" class="conversation-list"></nav>
      <div class="sidebar-footer">llm-rag &middot; Ollama (local)</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="履歴を開閉">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 id="conversation-title" class="conversation-title">新しい会話</h1>
        <span id="session-label" class="session-label"></span>
      </header>

      <main id="messages" class="messages">
        <div class="empty-state">
          <p>こんにちは。何について話しましょうか?</p>
        </div>
      </main>

      <footer class="composer-bar">
        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            class="composer-input"
            placeholder="メッセージを入力... (Shift+Enterで改行)"
            rows="1"
            required></textarea>
          <button id="send-btn" class="send-btn" type="submit" aria-label="送信">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="6 11 12 5 18 11"></polyline>
            </svg>
          </button>
        </form>
        <p class="composer-hint">llm-rag はローカルLLM (Ollama) で動作しています。誤った内容が含まれる場合があります。</p>
      </footer>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
