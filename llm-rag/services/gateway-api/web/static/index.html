<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-rag chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell" id="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <span class="brand-mark">LR</span>
        <button id="new-chat-btn" class="new-chat-btn" type="button">+ 新しい会話</button>
      </div>
      <nav id="conversation-list" class="conversation-list"></nav>
      <div class="sidebar-footer">llm-rag &middot; Ollama (local)</div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button id="sidebar-toggle" class="sidebar-toggle" type="button" aria-label="履歴を開閉">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
        <h1 id="conversation-title" class="conversation-title">新しい会話</h1>
        <span id="session-label" class="session-label"></span>
        <div class="view-switcher">
          <button id="tab-chat" class="view-tab active" type="button">チャット</button>
          <button id="tab-docs" class="view-tab" type="button">ドキュメント</button>
        </div>
        <span id="rag-badge" class="rag-badge"></span>
      </header>

      <!-- チャットビュー -->
      <main id="messages" class="messages">
        <div class="empty-state">
          <p>こんにちは。何について話しましょうか?</p>
        </div>
      </main>

      <footer class="composer-bar">
        <form id="chat-form" class="composer">
          <textarea
            id="message-input"
            class="composer-input"
            placeholder="メッセージを入力... (Shift+Enterで改行)"
            rows="1"
            required></textarea>
          <button id="send-btn" class="send-btn" type="submit" aria-label="送信">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="19" x2="12" y2="5"></line>
              <polyline points="6 11 12 5 18 11"></polyline>
            </svg>
          </button>
        </form>
        <p class="composer-hint">llm-rag はローカルLLM (Ollama) で動作しています。誤った内容が含まれる場合があります。</p>
      </footer>

      <!-- ドキュメント管理ビュー -->
      <div id="docs-view" class="docs-view" hidden>
        <div class="docs-panel">

          <section class="docs-form-section">
            <h2 class="docs-section-title">ドキュメントを登録</h2>
            <p class="docs-section-desc">テキストを貼り付けると段落ごとにチャンク分割され、ベクトル化してQdrantに保存されます。</p>
            <div class="docs-form">
              <input id="doc-title" class="docs-title-input" type="text" placeholder="タイトル（省略可 — 最初の40文字が自動設定されます）">
              <textarea id="doc-text" class="docs-text-input" placeholder="登録したいテキストをここに貼り付けてください...&#10;&#10;例: 技術文書、マニュアル、メモなど"></textarea>
              <div class="docs-form-footer">
                <span id="docs-status" class="docs-status"></span>
                <button id="docs-submit" class="docs-submit-btn" type="button">登録する</button>
              </div>
            </div>
          </section>

          <section class="docs-list-section">
            <div class="docs-list-header">
              <h2 class="docs-section-title">登録済みドキュメント</h2>
              <button id="docs-refresh" class="docs-refresh-btn" type="button">再読み込み</button>
            </div>
            <ul id="docs-list" class="docs-list">
              <li class="docs-list-empty">読み込み中...</li>
            </ul>
          </section>

        </div>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
