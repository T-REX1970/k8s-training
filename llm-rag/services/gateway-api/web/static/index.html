<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-rag chat</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="chat">
    <header>
      <h1>llm-rag</h1>
      <span id="session-label" class="session-label"></span>
      <button id="reset-btn" class="reset-btn" type="button">新しい会話</button>
    </header>
    <div id="messages" class="messages"></div>
    <form id="chat-form" class="chat-form">
      <input id="message-input" type="text" placeholder="メッセージを入力..." autocomplete="off" required>
      <button type="submit">送信</button>
    </form>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
