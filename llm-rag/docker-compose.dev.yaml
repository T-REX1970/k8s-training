services:
  ollama:
    image: ollama/ollama:0.3.14
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  llm-service:
    build:
      context: .
      dockerfile: services/llm-service/Dockerfile
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "llama3.2:1b"
    ports:
      - "8082:8080"
      - "9092:9090"
    depends_on:
      - ollama
    restart: unless-stopped

  embedding-service:
    build:
      context: ./services/embedding-service
    environment:
      PORT: "8080"
      OLLAMA_BASE_URL: "http://ollama:11434"
      OLLAMA_MODEL: "nomic-embed-text"
    ports:
      - "8083:8080"
    depends_on:
      - ollama
    restart: unless-stopped

  retrieval-service:
    build:
      context: .
      dockerfile: services/retrieval-service/Dockerfile
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      EMBEDDING_SERVICE_URL: "http://embedding-service:8080"
      QDRANT_URL: "http://qdrant:6333"
    ports:
      - "8084:8080"
      - "9094:9090"
    depends_on:
      - embedding-service
      - qdrant
    restart: unless-stopped

  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
    environment:
      PORT: "8080"
      LLM_SERVICE_ADDR: "llm-service:9090"
      RETRIEVAL_SERVICE_ADDR: "retrieval-service:9090"
    ports:
      - "8081:8080"
    depends_on:
      - llm-service
      - retrieval-service
    restart: unless-stopped

  gateway-api:
    build:
      context: ./services/gateway-api
    environment:
      PORT: "8080"
      CHAT_SERVICE_URL: "http://chat-service:8080"
      RETRIEVAL_SERVICE_URL: "http://retrieval-service:8080"
      RATE_LIMIT_RPS: "10"
      RATE_LIMIT_BURST: "20"
    ports:
      - "8080:8080"
    depends_on:
      - chat-service
      - retrieval-service
    restart: unless-stopped

volumes:
  ollama-data:
  qdrant-data:
