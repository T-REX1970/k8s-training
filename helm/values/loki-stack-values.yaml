# Loki Stack カスタム値
# チャート: grafana/loki-stack
# リリース名: loki
# 含まれるコンポーネント: Loki + Promtail
#
# インストール後のサービス名:
#   loki      : http://loki.monitoring:3100 (ClusterIP)
#   promtail  : DaemonSet として全ノードで動作
#
# データフロー:
#   各Podのログ → Promtail (DaemonSet) → Loki → Grafana

# ============================================================
# Loki 設定
# ============================================================
loki:
  enabled: true

  # Loki設定値
  config:
    auth_enabled: false

    server:
      http_listen_port: 3100

    ingester:
      chunk_idle_period: 1h
      max_chunk_age: 1h
      chunk_target_size: 1048576
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1

    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h

    storage_config:
      boltdb_shipper:
        active_index_directory: /data/loki/boltdb-shipper-active
        cache_location: /data/loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /data/loki/chunks

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      max_label_names_per_series: 30

    compactor:
      working_directory: /data/loki/boltdb-shipper-compactor
      shared_store: filesystem

  # データ永続化
  persistence:
    enabled: true
    storageClassName: "standard"
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  # ServiceはClusterIP (Promtail・Grafanaからクラスタ内経由でアクセス)
  service:
    type: ClusterIP
    port: 3100

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 512Mi

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3100"

# ============================================================
# Promtail 設定 (ログコレクター DaemonSet)
# ============================================================
promtail:
  enabled: true

  config:
    # Lokiへの送信先
    clients:
      - url: http://loki.monitoring:3100/loki/api/v1/push

    snippets:
      # Kubernetes Podログ収集設定
      pipelineStages:
        - cri: {}

      # scrapeConfigs を追加でカスタマイズ
      extraScrapeConfigs: |
        - job_name: kubernetes-pods-app
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
              action: replace
              target_label: app
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: pod
            - source_labels: [__meta_kubernetes_pod_container_name]
              action: replace
              target_label: container
            - source_labels: [__meta_kubernetes_pod_node_name]
              action: replace
              target_label: node_name

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  tolerations:
    # コントロールプレーンノードでもログ収集
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule

# ============================================================
# Grafana は kube-prometheus-stack で管理するため無効化
# ============================================================
grafana:
  enabled: false
