# embedding-service デプロイメント
# Ollamaのembeddings APIをラップし、テキスト→ベクトル変換を提供する
# retrieval-serviceから呼び出される内部サービス
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-service
  namespace: llm-rag
  labels:
    app.kubernetes.io/name: embedding-service
    app.kubernetes.io/instance: embedding-service
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: llm-rag
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: embedding-service
      app.kubernetes.io/instance: embedding-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: embedding-service
        app.kubernetes.io/instance: embedding-service
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: llm-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: embedding-service
          image: llm-rag/embedding-service:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: OLLAMA_BASE_URL
              value: "http://ollama:11434"
            # nomic-embed-text: 768次元ベクトル。Qdrantのcollection設定と合わせること
            - name: OLLAMA_MODEL
              value: "nomic-embed-text"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
