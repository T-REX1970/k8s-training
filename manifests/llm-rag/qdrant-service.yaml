# Qdrant ClusterIP Service
# retrieval-serviceからポート6333(REST)でアクセスする
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: llm-rag
  labels:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/instance: qdrant
    app.kubernetes.io/component: vector-store
    app.kubernetes.io/part-of: llm-rag
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/instance: qdrant
  ports:
    - name: http
      port: 6333
      targetPort: http
      protocol: TCP
