# Ollamaモデルデータ永続化用PVC
# llama3.2:1b (約1.3GB) + Phase 5カナリア用の追加モデルを見込んだ容量
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-data
  namespace: llm-rag
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama
    app.kubernetes.io/component: llm-runtime
    app.kubernetes.io/part-of: llm-rag
    app.kubernetes.io/managed-by: kubectl
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
