# retrieval-service デプロイメント
# ドキュメントのチャンク分割・ベクトル化・Qdrant保存と、クエリによる類似検索を提供する
# RAGパイプラインのコアコンポーネント
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrieval-service
  namespace: llm-rag
  labels:
    app.kubernetes.io/name: retrieval-service
    app.kubernetes.io/instance: retrieval-service
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: llm-rag
    app.kubernetes.io/managed-by: kubectl
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: retrieval-service
      app.kubernetes.io/instance: retrieval-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retrieval-service
        app.kubernetes.io/instance: retrieval-service
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/component: backend
        app.kubernetes.io/part-of: llm-rag
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containers:
        - name: retrieval-service
          image: llm-rag/retrieval-service:dev
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: EMBEDDING_SERVICE_URL
              value: "http://embedding-service:8080"
            - name: QDRANT_URL
              value: "http://qdrant:6333"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
