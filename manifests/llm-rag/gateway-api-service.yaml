# gateway-apiのService
# ブラウザチャットUI(/)とAPI(/api/chat)はNodePortで外部公開
apiVersion: v1
kind: Service
metadata:
  name: gateway-api
  namespace: llm-rag
  labels:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/instance: gateway-api
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: llm-rag
    app.kubernetes.io/managed-by: kubectl
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gateway-api
    app.kubernetes.io/instance: gateway-api
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
      nodePort: 30880
