# llm-rag Kustomize設定
# 使用方法:
#   kubectl apply -k manifests/llm-rag/
#   kubectl delete -k manifests/llm-rag/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 1. 名前空間
  - llm-rag-namespace.yaml

  # 2. Ollama (PVC → Deployment → Service の順)
  - ollama-pvc.yaml
  - ollama-deployment.yaml
  - ollama-service.yaml

  # 3. llm-service
  - llm-service-deployment.yaml
  - llm-service-service.yaml

  # 4. chat-service
  - chat-service-deployment.yaml
  - chat-service-service.yaml

  # 5. gateway-api (NodePort 30880で外部公開)
  - gateway-api-deployment.yaml
  - gateway-api-service.yaml
