# llm-rag Kustomize設定
# 使用方法:
#   kubectl apply -k manifests/llm-rag/
#   kubectl delete -k manifests/llm-rag/
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # 1. 名前空間
  - llm-rag-namespace.yaml

  # 2. Ollama (PVC → Deployment → Service の順)
  - ollama-pvc.yaml
  - ollama-deployment.yaml
  - ollama-service.yaml

  # 3. Qdrant ベクトルDB (PVC → Deployment → Service)
  - qdrant-pvc.yaml
  - qdrant-deployment.yaml
  - qdrant-service.yaml

  # 4. embedding-service (Ollama embeddingsのラッパー)
  - embedding-service-deployment.yaml
  - embedding-service-service.yaml

  # 5. retrieval-service (RAGのドキュメント管理・類似検索)
  - retrieval-service-deployment.yaml
  - retrieval-service-service.yaml

  # 6. llm-service
  - llm-service-deployment.yaml
  - llm-service-service.yaml

  # 7. chat-service (RAGコンテキストを取得してLLMを呼び出す)
  - chat-service-deployment.yaml
  - chat-service-service.yaml

  # 8. gateway-api (NodePort 30880で外部公開)
  - gateway-api-deployment.yaml
  - gateway-api-service.yaml
