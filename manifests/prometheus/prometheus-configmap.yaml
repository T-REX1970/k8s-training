# Prometheus設定ファイル
# スクレイプ対象: 自身、Kubernetes APIサーバー、kubelet/cAdvisor、Pod
# VictoriaMetricsへのremote_writeも設定済み
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s       # デフォルトのスクレイプ間隔
      evaluation_interval: 15s   # アラートルールの評価間隔
      scrape_timeout: 10s

    # VictoriaMetricsへのリモート書き込み設定
    # Prometheusが収集したメトリクスをVMにも転送する
    remote_write:
      - url: "http://victoria-metrics:8428/api/v1/write"
        queue_config:
          max_samples_per_send: 10000
          batch_send_deadline: 5s

    scrape_configs:
      # Prometheus自身のメトリクス収集
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # KubernetesのAPIサーバーメトリクス
      - job_name: "kubernetes-apiservers"
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels:
              - __meta_kubernetes_namespace
              - __meta_kubernetes_service_name
              - __meta_kubernetes_endpoint_port_name
            action: keep
            regex: default;kubernetes;https

      # kubeletのメトリクス (ノードレベルの情報)
      - job_name: "kubernetes-nodes"
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # cAdvisorメトリクス (コンテナのCPU・メモリ使用量)
      - job_name: "kubernetes-cadvisor"
        kubernetes_sd_configs:
          - role: node
        scheme: https
        metrics_path: /metrics/cadvisor
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

      # アノテーションでスクレイプ対象を指定したPod
      # prometheus.io/scrape: "true" を付けたPodが対象
      - job_name: "kubernetes-pods"
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels:
              - __address__
              - __meta_kubernetes_pod_annotation_prometheus_io_port
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
