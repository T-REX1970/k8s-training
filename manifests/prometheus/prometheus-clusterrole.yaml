# PrometheusがPod・Service・Endpointのメトリクスを収集するための権限
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/version: "v2.49.1"
    app.kubernetes.io/component: metrics
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
rules:
  # Pod、Service、Endpointのメタ情報をサービスディスカバリに使用
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  # Ingressのサービスディスカバリ
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  # /metrics エンドポイントへのHTTPアクセス
  - nonResourceURLs: ["/metrics", "/metrics/cadvisor"]
    verbs: ["get"]
