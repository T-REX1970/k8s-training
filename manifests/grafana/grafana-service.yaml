# Grafana縺ｮService
# NodePort 30300縺ｧminikube縺九ｉ逶ｴ謗･繧｢繧ｯ繧ｻ繧ｹ蜿ｯ閭ｽ
# 繧｢繧ｯ繧ｻ繧ｹ: minikube service grafana -n monitoring
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/version: "10.3.1"
    app.kubernetes.io/component: visualization
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
      nodePort: 30300
