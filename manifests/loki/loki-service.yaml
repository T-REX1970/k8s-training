# LokiのService
# Promtailからのログ書き込み先: http://loki:3100/loki/api/v1/push
# GrafanaのデータソースURL: http://loki:3100
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/version: "2.9.4"
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
  ports:
    - name: http
      port: 3100
      targetPort: http
      protocol: TCP
    - name: grpc
      port: 9096
      targetPort: grpc
      protocol: TCP
