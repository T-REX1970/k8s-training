# Loki設定ファイル
# Single Binary (モノリシック) モード - 学習・開発環境向け
# 本番ではLoki Distributed (マイクロサービス構成) を推奨
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/instance: loki
    app.kubernetes.io/component: logging
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
data:
  loki.yaml: |
    # 認証無効 (学習環境用)
    auth_enabled: false

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory

    # スキーマ設定 (v12 + tsdb: Loki 2.9.x推奨)
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v12
          index:
            prefix: index_
            period: 24h

    # ログの取り込み制限
    limits_config:
      # 古いログの取り込みを拒否 (168h = 7日以上前のログ)
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      # 1ストリームあたりの最大ラベル数
      max_label_names_per_series: 30

    # テーブル管理 (データ保持期間)
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s

    # クエリスケジューラー設定
    query_range:
      results_cache:
        cache:
          embedded_cache:
            enabled: true
            max_size_mb: 100
