# Promtail DaemonSet
# 全ノードで1つずつ起動し、そのノードのコンテナログを収集する
#
# セキュリティ注意:
#   runAsUser: 0 (root) が必要な理由:
#   - /var/log/pods はノードのファイルシステムをhostPathでマウント
#   - ログファイルのオーナーはrootのため、非rootユーザーでは読み取れない
#   - 本番環境ではlogrotateやファイルパーミッション調整で非root化も可能
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/instance: promtail
    app.kubernetes.io/version: "2.9.4"
    app.kubernetes.io/component: log-collector
    app.kubernetes.io/part-of: k8s-observability
    app.kubernetes.io/managed-by: kubectl
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
      app.kubernetes.io/instance: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
        app.kubernetes.io/instance: promtail
        app.kubernetes.io/version: "2.9.4"
        app.kubernetes.io/component: log-collector
        app.kubernetes.io/part-of: k8s-observability
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9080"
    spec:
      serviceAccountName: promtail
      # ノードログ読み取りのためrootで実行 (学習環境許容)
      securityContext:
        runAsUser: 0
        runAsGroup: 0
      tolerations:
        # コントロールプレーンノードでも動作させる
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - name: http
              containerPort: 9080
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            # ノードのコンテナログを読み取り (読み取り専用)
            - name: varlog
              mountPath: /var/log
              readOnly: true
            # スクレイプ位置情報の保存先
            - name: positions
              mountPath: /run/promtail
            - name: tmp
              mountPath: /tmp
          env:
            # 自分が動いているノード名を環境変数で取得
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      volumes:
        - name: config
          configMap:
            name: promtail-config
        # ホストノードの /var/log をマウント
        - name: varlog
          hostPath:
            path: /var/log
        # 位置情報はemptyDirで永続化 (Pod再起動後もノード内に残る)
        - name: positions
          emptyDir: {}
        - name: tmp
          emptyDir: {}
